<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroNest</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide/dist/lucide.min.js"></script>
</head>

<body>

<header class="navbar">
    <div class="logo">MicroNest</div>

    <select id="langSelect" class="lang-selector">
        <option value="fr">FR</option>
        <option value="en">EN</option>
    </select>
</header>

<main class="hero-container">
    <h1 data-i18n="hero_title"></h1>
    <p data-i18n="hero_subtitle"></p>

    <div class="hero-buttons">
        <button id="openRegisterBtn" class="btn-primary" data-i18n="btn_register"></button>
        <button id="openLoginBtn" class="btn-secondary" data-i18n="btn_login"></button>
        <!-- AJOUTER CE BOUTON -->
<button id="joinFamilyBtn"> JOIN FAMILLY</button>
    </div>
</main>

<section id="authModal" class="modal-overlay hidden">

    <div class="modal-card">

        <button id="closeAuthBtn" class="btn-close">✖</button>

        <div class="modal-header">
            <h2 id="authTitle"></h2>
            <p id="authMessage"></p>
        </div>

        <form id="loginForm" class="auth-form">
            <label data-i18n="label_email"></label>
        
        
        <input id="loginEmail" type="email" required>

<label data-i18n="label_password"></label>

<input id="loginPassword" type="password" required>

            <button class="btn-submit" data-i18n="btn_connect"></button>

            <p>
                <span data-i18n="text_no_account"></span>
                <button type="button" id="openRegisterBtn2" class="link-btn" data-i18n="link_register"></button>
            </p>
            
            <button type="button" id="openForgotBtn" class="link-btn">
    Mot de passe oublié ?
</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
            <label data-i18n="label_email"></label>
          
          
          <input id="registerEmail" type="email" required>

<label data-i18n="label_password"></label>

<input id="registerPassword" type="password" required>
          

            <button class="btn-submit" data-i18n="btn_register_submit"></button>
        </form>

     <form id="forgotForm" class="auth-form hidden">
    <label data-i18n="label_email"></label>
    
    <input id="forgotEmail" type="email" required>

    <button class="btn-submit" type="submit" data-i18n="btn_forgot_submit">
        Envoyer le lien
    </button>
</form>
    </div>
</section>

<main id="page2" class="container hidden">

    <section class="welcome-box">
        <h2 data-i18n="p2_title"></h2>
        <p data-i18n="p2_subtitle"></p>
    </section>

    <nav class="function-menu">
        <button id="btnGoFind" class="menu-card">
            <i data-lucide="search"></i>
            <span data-i18n="menu_find"></span>
        </button>

        <button id="btnGoReminders" class="menu-card">
            <i data-lucide="bell"></i>
            <span data-i18n="menu_reminders"></span>
        </button>

        <button id="btnGoMessages" class="menu-card">
            <i data-lucide="message-square"></i>
            <span data-i18n="menu_messages"></span>
        </button>
    </nav>

    <section id="subPageFind" class="sub-page hidden">

        <h3 data-i18n="title_find"></h3>
        
        
        <div class="search-box">
    <input id="searchObjInput" type="text" data-i18n-placeholder="search_placeholder">
</div>
        

        <input id="objName" type="text" placeholder="">
        <input id="objLoc" type="text" placeholder="">

        <button type="button" id="btnSubmitObj" class="btn-add">+</button>

        <ul id="objectList"></ul>

       <button class="btn-back" data-i18n="btn_back">
    <span class="icon">←</span>
    <span class="text">Retour</span>
</button>
    </section>

    <section id="subPageReminders" class="sub-page hidden">

        <h3 data-i18n="title_reminders"></h3>

        <input id="reminderText" type="text" placeholder="">
       <input id="reminderDate" type="date"> 

       
       <button type="button" id="btnSubmitReminder"
class="btn-add">+</button>
       
        <div id="reminderList"></div>

<button class="btn-back" data-i18n="btn_back">
    <span class="icon">←</span>
    <span class="text">Retour</span>
</button>
    </section>

    <section id="subPageMessages" class="sub-page hidden">

        <h3 data-i18n="title_messages"></h3>

        <textarea id="msgText" placeholder=""></textarea>

        <button type="button" id="btnSubmitMsg" class="btn-add">+</button>

        <div id="messageBoard"></div>

       
       <button class="btn-back" data-i18n="btn_back">
    <span class="icon">←</span>
    <span class="text">Retour</span>
</button>


    </section>

</main>

<script>
window.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
});
</script>

<script type="module" src="firebase-config.js"></script>


<script type="module" src="app.js"></script>

</body>
</html>
